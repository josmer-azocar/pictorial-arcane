name: Deploy Backend to Azure

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v3

      - name: 2. Configurar el entorno de Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21' 
          distribution: 'temurin'
          cache: maven

      - name: 3. Compilar el proyecto con Maven (Ignorando tests por rapidez)
        working-directory: ./backend 
        run: mvn clean package -DskipTests

      - name: 3.5 [DEBUG] Listar archivos generados en target
        run: ls -la ./backend/target/

      - name: 4. Desplegar el .jar a Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'pictorialArcane'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: 'backend/target/*.jar'