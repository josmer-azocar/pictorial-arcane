spring.application.name=pictorialArcane

#Postgres SQL
spring.datasource.driver-class-name=org.postgresql.Driver

#Spring Data JPA
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}


spring.jpa.hibernate.ddl-auto=${HIBERNATE_MODE}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

#Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=josue05azocar@gmail.com
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Configuracion de Azure Blob Storage
azure.storage.connection-string=${STORAGE_CONNECTION}
azure.storage.container-name=pictorialpictures

# Limita el tamanio de los archivos que Spring acepta
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

spring.docker.compose.enabled=${DOCKER_CONF}
